<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICSE Class 10 Physics Learning Quiz</title>
    <!-- Include html2pdf library for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-light: #64748b;
            --success: #10b981;
            --success-bg: #d1fae5;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --border: #e2e8f0;
            --easy-color: #10b981;
            --medium-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        header h1 {
            color: var(--primary-dark);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        /* Level Tabs */
        .level-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .level-btn {
            padding: 10px 30px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .level-btn#btn-easy.active { background: var(--easy-color); color: white; border-color: var(--easy-color); }
        .level-btn#btn-medium.active { background: var(--medium-color); color: white; border-color: var(--medium-color); }

        /* Chapter Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Main Content Area */
        .content-card {
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: none;
        }

        .content-card.active { display: block; }

        /* Questions */
        .question-block {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            page-break-inside: avoid;
        }

        .question-block:last-child { border-bottom: none; }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            background: #f8fafc;
        }

        .option-label:hover:not(.locked) { background: #e2e8f0; }

        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            accent-color: var(--primary);
        }

        .option-label input[type="radio"]:disabled { cursor: not-allowed; }

        /* Locked Answer Styling */
        .option-label.locked { cursor: not-allowed; opacity: 0.85; }
        .option-label.correct-choice { background-color: var(--success-bg); border-color: var(--success); font-weight: 600; }
        .option-label.incorrect-choice { background-color: var(--danger-bg); border-color: var(--danger); opacity: 0.6; text-decoration: line-through; }

        /* Immediate Feedback Box */
        .feedback-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-in;
            line-height: 1.5;
        }
        
        .feedback-box strong { display: block; margin-bottom: 4px; font-size: 1.05rem; }
        .feedback-box.correct { background-color: #f0fdf4; border: 1px solid var(--success); color: #065f46; }
        .feedback-box.incorrect { background-color: #fef2f2; border: 1px solid var(--danger); color: #991b1b; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons */
        .btn { display: inline-block; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-align: center; color: white; }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background-color: var(--primary); margin-top: 20px; }
        .btn-secondary { background-color: var(--text-light); margin-top: 10px; }
        .btn-dark { background-color: var(--text-main); margin-top: 10px; }

        /* Report Styles */
        .report-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
        .score-box { background: var(--success-bg); border: 2px solid var(--success); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 30px; }
        .score-box h2 { color: var(--success); font-size: 2.5rem; margin: 10px 0; }
        .score-box p { color: #047857; font-weight: 600; font-size: 1.2rem; }

        .review-item { padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 6px solid; background: #f8fafc; page-break-inside: avoid; }
        .review-item.correct { border-left-color: var(--success); }
        .review-item.incorrect { border-left-color: var(--danger); }
        
        .review-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; margin-bottom: 10px; }
        .badge-correct { background: var(--success-bg); color: var(--success); }
        .badge-incorrect { background: var(--danger-bg); color: var(--danger); }

        .explanation { margin-top: 15px; padding: 12px; background: #e2e8f0; border-radius: 6px; font-size: 0.95rem; color: var(--text-main); }

        @media (min-width: 600px) { .options-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Physics Learning Quiz</h1>
        <p>ICSE Grade 10 | 40 Marks per Quiz</p>
    </header>

    <!-- Difficulty Level Tabs -->
    <div class="level-tabs">
        <button class="level-btn active" id="btn-easy" onclick="setLevel('easy')">Easy Level</button>
        <button class="level-btn" id="btn-medium" onclick="setLevel('medium')">Medium Level</button>
    </div>

    <!-- Chapter Navigation Tabs -->
    <div class="tabs" id="tabs-container">
        <button class="tab-btn active" id="tab-ch1" onclick="loadQuiz('ch1')">Chapter 1: Force</button>
        <button class="tab-btn" id="tab-ch2" onclick="loadQuiz('ch2')">Chapter 2: Work & Energy</button>
        <button class="tab-btn" id="tab-ch3" onclick="loadQuiz('ch3')">Chapter 3: Machines</button>
    </div>

    <!-- Quiz Container -->
    <div id="quiz-view" class="content-card active">
        <h2 id="quiz-title" style="margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px;"></h2>
        <div id="questions-container"></div>
        <button class="btn btn-primary" onclick="submitQuiz()">Submit & Get Final Report</button>
    </div>

    <!-- Report Container -->
    <div id="report-view" class="content-card">
        <div id="printable-report">
            <!-- Report content injected here -->
        </div>
        <button class="btn btn-dark" onclick="exportPDF()">📄 Export Report as PDF</button>
        <button class="btn btn-secondary" onclick="backToQuizzes()">↩ Retake / Change Quiz</button>
    </div>
</div>

                    { q: "Which has a larger power: Machine A doing 100J in 2s, or Machine B doing 200J in 5s?", o: ["Machine A", "Machine B", "Both equal", "Cannot say"], a: 0, e: "Power A = 100/2 = 50W. Power B = 200/5 = 40W. Machine A has more power." },
                    { q: "The law of conservation of energy applies to:", o: ["Only mechanical systems", "Only electrical systems", "All isolated systems", "Only living things"], a: 2, e: "It is a universal law applicable to any closed, isolated system." },
                    { q: "If a body is moved along a circular path, work done by the centripetal force is:", o: ["Positive", "Negative", "Zero", "Infinite"], a: 2, e: "Because centripetal force is always perpendicular (90 deg) to the path." },
                    { q: "Work done by a boy pushing a wall is:", o: ["Positive", "Negative", "Zero", "Maximum"], a: 2, e: "The wall does not move, so displacement is zero. W = 0." },
                    { q: "1 MegaWatt (MW) is equal to:", o: ["10^3 W", "10^6 W", "10^9 W", "10^12 W"], a: 1, e: "Mega means one million (10^6)." }
                ]
            },
            ch3: {
                title: "Chapter 3: Machines (Medium Level)",
                questions: [
                    { q: "If a machine has an efficiency of 80% and a Velocity Ratio of 5, its Mechanical Advantage is:", o: ["4", "6.25", "0.16", "5"], a: 0, e: "M.A. = V.R. × Efficiency = 5 × 0.80 = 4." },
                    { q: "Why is the mechanical advantage of a Class II lever always > 1?", o: ["Effort arm > Load arm", "Load arm > Effort arm", "Fulcrum is at end", "It has no friction"], a: 0, e: "Because the load is in the middle, the effort is further away, making the effort arm longer." },
                    { q: "Why is the mechanical advantage of a Class III lever always < 1?", o: ["Effort arm > Load arm", "Load arm > Effort arm", "Fulcrum is at end", "It has no friction"], a: 1, e: "Because the effort is in the middle, it is closer to the fulcrum, making the load arm longer." },
                    { q: "A single movable pulley has a V.R. of 2. If its efficiency is 100%, what effort is needed to lift a 100N load?", o: ["100 N", "50 N", "200 N", "0 N"], a: 1, e: "If eff=100%, M.A.=2. Effort = Load / M.A. = 100 / 2 = 50 N." },
                    { q: "In a practical movable pulley, if effort needed is 60N to lift a 100N load, what is its M.A.?", o: ["2", "1.66", "0.6", "1"], a: 1, e: "M.A. = Load / Effort = 100 / 60 = 1.66." },
                    { q: "A block and tackle system has 5 pulleys. What is its Velocity Ratio?", o: ["2.5", "5", "10", "Depends on friction"], a: 1, e: "V.R. depends solely on the number of pulleys (strands supporting the lower block), which is 5." },
                    { q: "If a machine overcomes a load of 500N using an effort of 100N, the M.A. is:", o: ["5", "0.2", "50000", "400"], a: 0, e: "M.A. = Load / Effort = 500 / 100 = 5." },
                    { q: "To increase the efficiency of a block and tackle system, the lower block should be:", o: ["As heavy as possible", "As light as possible", "Made of iron", "Kept un-oiled"], a: 1, e: "A lighter movable block wastes less effort lifting the pulleys themselves." },
                    { q: "A machine with V.R. = 4 and Efficiency = 75%. What is the Work Output if Work Input is 1000J?", o: ["750 J", "1000 J", "1333 J", "250 J"], a: 0, e: "Efficiency = Output / Input. 0.75 = Output / 1000. Output = 750 J." },
                    { q: "A crowbar of length 120cm has its fulcrum at 20cm from the load. The M.A. is:", o: ["5", "6", "4", "0.2"], a: 0, e: "Load arm=20cm. Effort arm=120-20=100cm. M.A. = Effort Arm / Load Arm = 100/20 = 5." },
                    { q: "In gears, if the driving wheel has 10 teeth and driven wheel has 30 teeth, it acts as a:", o: ["Speed multiplier", "Force multiplier", "Direction changer only", "None"], a: 1, e: "The larger driven wheel turns slower but with greater force (torque)." },
                    { q: "In the gear system above (10 driving, 30 driven), what is the gear ratio?", o: ["3", "1/3", "300", "20"], a: 0, e: "Gear Ratio = Number of teeth in driven / Number of teeth in driving = 30 / 10 = 3." },
                    { q: "A machine is irreversible (self-locking) if its efficiency is:", o: ["> 50%", "< 50%", "Exactly 100%", "0%"], a: 1, e: "If efficiency is less than 50%, friction is high enough to hold the load in place when effort is removed." },
                    { q: "A screw jack is an example of an irreversible machine because:", o: ["Its M.A. is small", "Its V.R. is small", "Friction is very high", "It is very fast"], a: 2, e: "High friction (efficiency < 50%) keeps the car from falling when you let go of the handle." },
                    { q: "A single fixed pulley does not multiply force. Why is it used?", o: ["It looks nice", "It multiplies speed", "It applies effort in a convenient downward direction", "It has >100% efficiency"], a: 2, e: "It's much easier to use your body weight to pull down than to pull up." },
                    { q: "The V.R. of an inclined plane of length L and height H is:", o: ["H / L", "L / H", "L × H", "L + H"], a: 1, e: "V.R. = Distance effort moves (L) / Distance load moves (H)." },
                    { q: "A ramp is 10m long and 2m high. Its V.R. is:", o: ["0.2", "5", "20", "8"], a: 1, e: "V.R. = Length / Height = 10 / 2 = 5." },
                    { q: "A force multiplier machine has:", o: ["M.A. > 1", "M.A. < 1", "M.A. = 1", "M.A. = 0"], a: 0, e: "It multiplies your effort, meaning the Load is bigger than the Effort (Load/Effort > 1)." },
                    { q: "A speed multiplier machine has:", o: ["M.A. > 1", "M.A. < 1", "M.A. = 1", "M.A. = 0"], a: 1, e: "It sacrifices force (you push harder) to move the load a larger distance or faster." },
                    { q: "In a combination of one fixed and one movable pulley, the total V.R. is:", o: ["1", "2", "3", "4"], a: 1, e: "The movable pulley provides a V.R. of 2, the fixed one only changes direction." },
                    { q: "To lift a load of 400N using a block and tackle of V.R.=4 (eff=100%), the effort is:", o: ["400 N", "100 N", "1600 N", "50 N"], a: 1, e: "Ideal M.A. = V.R. = 4. Effort = Load/M.A. = 400/4 = 100 N." },
                    { q: "Why is the efficiency of a practical movable pulley less than 100%?", o: ["Weight of the pulley and friction", "Gravity changes", "Air resistance", "Length of rope"], a: 0, e: "You waste some effort lifting the actual physical pulley wheel and overcoming axle friction." },
                    { q: "An oar of a rowing boat is a lever of:", o: ["Class I", "Class II", "Class III", "Class IV"], a: 1, e: "The water acts as the fulcrum (pivot), the boat is the load in the middle, and you pull the handle (effort)." },
                    { q: "A wheel nut wrench (spanner) acts as a:", o: ["Lever", "Pulley", "Inclined plane", "Wedge"], a: 0, e: "It acts as a lever pivoting on the nut." },
                    { q: "A pair of fire tongs is a lever of Class:", o: ["I", "II", "III", "IV"], a: 2, e: "You squeeze the middle (effort) to pick up a coal (load) at the end, pivoting at the joined back (fulcrum)." },
                    { q: "In a Class II lever, if Load Arm is 0.5m and Effort Arm is 1.5m, M.A. is:", o: ["0.33", "3", "1", "0.75"], a: 1, e: "M.A. = Effort Arm / Load Arm = 1.5 / 0.5 = 3." },
                    { q: "If the V.R. of a machine is 3, what does it mean?", o: ["Load moves 3 times as fast as effort", "Effort moves 3 times as fast as load", "Efficiency is 300%", "M.A. is exactly 3"], a: 1, e: "You have to pull 3 meters of rope for every 1 meter the load goes up." },
                    { q: "The mechanical advantage of a machine is 4. If effort is 50N, load lifted is:", o: ["12.5 N", "50 N", "200 N", "20 N"], a: 2, e: "Load = M.A. × Effort = 4 × 50 = 200 N." },
                    { q: "Which of the following is an example of a Class I lever where M.A. < 1?", o: ["Pliers", "Crowbar", "A pair of scissors", "A see-saw"], a: 2, e: "Scissors have long blades (load arm) and short handles (effort arm), so M.A. < 1 (speed multiplier)." },
                    { q: "Which of the following is an example of a Class I lever where M.A. > 1?", o: ["Pliers", "Scissors", "Fire tongs", "Sugar tongs"], a: 0, e: "Pliers have short jaws (load arm) and long handles (effort arm), making them a force multiplier." },
                    { q: "Is a knife an example of a wedge?", o: ["Yes", "No", "Only if it is dull", "It is a pulley"], a: 0, e: "A wedge is basically two inclined planes put together to split objects." },
                    { q: "A single fixed pulley is used to draw water from a well. If the bucket weighs 100N and friction is 20N, effort required is:", o: ["100 N", "80 N", "120 N", "200 N"], a: 2, e: "You must pull with enough force to lift the bucket AND overcome friction: 100 + 20 = 120 N." },
                    { q: "The efficiency of the pulley in the previous question is:", o: ["100%", "83.3%", "120%", "50%"], a: 1, e: "Eff = (Load / Effort) / V.R. = (100 / 120) / 1 = 0.833 or 83.3%." },
                    { q: "In a block and tackle with 4 pulleys, what is the V.R. if you pull the rope UPWARDS?", o: ["3", "4", "5", "6"], a: 2, e: "If you pull upwards, that final strand also supports the load, so V.R. = n + 1 = 5." },
                    { q: "In a block and tackle with 4 pulleys, what is the V.R. if you pull the rope DOWNWARDS?", o: ["3", "4", "5", "6"], a: 1, e: "If you pull downwards, the final strand does not pull the block up, so V.R. = n = 4." },
                    { q: "A machine is considered 'reversible' if its efficiency is:", o: ["< 50%", "> 50%", "Exactly 100%", "0%"], a: 1, e: "If efficiency > 50%, the load will fall back down if you let go of the effort." },
                    { q: "The principle of an ideal machine is based on the law of conservation of:", o: ["Force", "Momentum", "Energy", "Power"], a: 2, e: "Work input equals work output, meaning no energy is lost." },
                    { q: "In a wheel and axle, the V.R. is:", o: ["Radius of axle / Radius of wheel", "Radius of wheel / Radius of axle", "Wheel diameter × Axle diameter", "1"], a: 1, e: "Effort is usually applied to the larger wheel, so V.R. = R / r." },
                    { q: "Can the V.R. of a specific machine change?", o: ["Yes, with friction", "Yes, with load", "No, it is constant", "Only in space"], a: 2, e: "V.R. depends solely on the physical geometry/dimensions of the machine." },
                    { q: "Can the M.A. of a specific machine change?", o: ["Yes, with friction", "No, it is constant", "Only if geometry changes", "Never"], a: 0, e: "Yes, M.A. drops if friction increases, because you have to apply more effort." }
                ]
            }
        }
    };

    // --- APPLICATION STATE ---
    let currentLevel = 'easy';
    let currentChapter = 'ch1';
    let userAnswers = {
        easy: { ch1: {}, ch2: {}, ch3: {} },
        medium: { ch1: {}, ch2: {}, ch3: {} }
    };

    // --- FUNCTIONS ---
    function init() {
        loadQuiz('ch1');
    }

    function setLevel(level) {
        currentLevel = level;
        
        // Update level buttons
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${level}`).classList.add('active');

        // Reload current chapter with new level
        loadQuiz(currentChapter);
    }

    function loadQuiz(chapterId) {
        currentChapter = chapterId;
        
        // Update Chapter Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${chapterId}`).classList.add('active');

        // Show quiz view, hide report view
        document.getElementById('quiz-view').classList.add('active');
        document.getElementById('report-view').classList.remove('active');

        const activeData = quizData[currentLevel][chapterId];

        // Set Title
        document.getElementById('quiz-title').innerText = activeData.title;

        // Render Questions
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        activeData.questions.forEach((qObj, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-block';
            
            // Check state to see if this was already answered previously
            const answeredOption = userAnswers[currentLevel][chapterId][index];
            const isAnswered = answeredOption !== undefined;
            
            let optionsHTML = '';
            qObj.o.forEach((opt, optIndex) => {
                const isChecked = isAnswered && answeredOption === optIndex;
                let optionClasses = 'option-label ';
                
                // If the question is answered, apply styling classes
                if (isAnswered) {
                    optionClasses += 'locked ';
                    if (optIndex === qObj.a) {
                        optionClasses += 'correct-choice ';
                    } else if (isChecked) {
                        optionClasses += 'incorrect-choice ';
                    }
                }

                optionsHTML += `
                    <label class="${optionClasses}" id="label-${currentLevel}-${chapterId}-${index}-${optIndex}">
                        <input type="radio" name="q-${currentLevel}-${chapterId}-${index}" value="${optIndex}" 
                        ${isChecked ? 'checked' : ''}
                        ${isAnswered ? 'disabled' : ''}
                        onchange="selectAnswer('${chapterId}', ${index}, ${optIndex})">
                        ${opt}
                    </label>
                `;
            });

            // Set up the immediate feedback box if already answered
            let feedbackHTML = '';
            if (isAnswered) {
                const isCorrect = answeredOption === qObj.a;
                feedbackHTML = `
                    <div id="feedback-${currentLevel}-${chapterId}-${index}" class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}" style="display:block;">
                        <strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong>
                        Learning Note: ${qObj.e}
                    </div>
                `;
            } else {
                feedbackHTML = `<div id="feedback-${currentLevel}-${chapterId}-${index}" class="feedback-box"></div>`;
            }

            qDiv.innerHTML = `
                <div class="question-text">${index + 1}. ${qObj.q}</div>
                <div class="options-grid">${optionsHTML}</div>
                ${feedbackHTML}
            `;
            container.appendChild(qDiv);
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Handles user selecting an answer visually and in state
    window.selectAnswer = function(chapterId, qIndex, optIndex) {
        // LOCK IN ANSWER: Check if already answered
        if (userAnswers[currentLevel][chapterId][qIndex] !== undefined) return;

        // Save answer to state
        userAnswers[currentLevel][chapterId][qIndex] = optIndex;
        
        const qObj = quizData[currentLevel][chapterId].questions[qIndex];
        const isCorrect = optIndex === qObj.a;
        
        // Visual update - Lock the options and show correct/incorrect colors
        for(let i=0; i<4; i++) {
            const label = document.getElementById(`label-${currentLevel}-${chapterId}-${qIndex}-${i}`);
            const input = label.querySelector('input');
            
            if (label && input) {
                label.classList.add('locked');
                input.disabled = true; // Disable all inputs for this question
                
                if (i === qObj.a) {
                    label.classList.add('correct-choice'); // Highlight the real answer
                } else if (i === optIndex) {
                    label.classList.add('incorrect-choice'); // Strike-through wrong guess
                }
            }
        }
        
        // Show immediate feedback note with justification
        const feedbackBox = document.getElementById(`feedback-${currentLevel}-${chapterId}-${qIndex}`);
        feedbackBox.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
        feedbackBox.innerHTML = `
            <strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong>
            Learning Note: ${qObj.e}
        `;
        feedbackBox.style.display = 'block';
    }

    window.submitQuiz = function() {
        const activeData = quizData[currentLevel][currentChapter];
        const totalQ = activeData.questions.length;
        const answeredQ = Object.keys(userAnswers[currentLevel][currentChapter]).length;

        if (answeredQ < totalQ) {
            const confirmSubmit = confirm(`You have only answered ${answeredQ} out of ${totalQ} questions. Unanswered questions will be marked wrong. Do you want to submit anyway?`);
            if(!confirmSubmit) return;
        }

        generateReport(activeData);
    }

    function generateReport(data) {
        // Hide quiz, show report
        document.getElementById('quiz-view').classList.remove('active');
        document.getElementById('report-view').classList.add('active');
        
        const reportContainer = document.getElementById('printable-report');
        let score = 0;
        let reviewHTML = '';

        data.questions.forEach((qObj, index) => {
            const userAns = userAnswers[currentLevel][currentChapter][index];
            const isAnswered = userAns !== undefined;
            const isCorrect = isAnswered && (userAns === qObj.a);
            
            if (isCorrect) score++;

            const badgeClass = isCorrect ? 'badge-correct' : 'badge-incorrect';
            const badgeText = isCorrect ? '✓ Correct' : '✗ Incorrect';
            const userAnswerText = isAnswered ? qObj.o[userAns] : 'Not Answered';

            reviewHTML += `
                <div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <span class="review-badge ${badgeClass}">${badgeText}</span>
                    <div class="question-text">${index + 1}. ${qObj.q}</div>
                    
                    <p style="margin-bottom: 5px;"><strong>Your Answer:</strong> 
                        <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnswerText}</span>
                    </p>
                    
                    ${!isCorrect ? `<p style="margin-bottom: 5px;"><strong>Correct Answer:</strong> <span style="color: var(--success); font-weight: bold;">${qObj.o[qObj.a]}</span></p>` : ''}
                    
                    <div class="explanation">
                        <strong>Learning Note:</strong> ${qObj.e}
                    </div>
                </div>
            `;
        });

        const percentage = ((score / data.questions.length) * 100).toFixed(0);
        const dateString = new Date().toLocaleDateString();

        reportContainer.innerHTML = `
            <div class="report-header">
                <h2>Performance Report</h2>
                <h3 style="color: var(--text-light);">${data.title}</h3>
                <p>Generated on: ${dateString}</p>
            </div>
            
            <div class="score-box">
                <p>TOTAL MARKS OBTAINED</p>
                <h2>${score} / ${data.questions.length}</h2>
                <p>Accuracy: ${percentage}%</p>
            </div>

            <h3 style="margin-bottom: 20px; text-align: center; color: var(--primary-dark);">Detailed Review</h3>
            ${reviewHTML}
        `;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.backToQuizzes = function() {
        // Clear answers for current level & chapter to allow retake
        userAnswers[currentLevel][currentChapter] = {};
        
        // Reload the current quiz view
        loadQuiz(currentChapter);
    }

    window.exportPDF = function() {
        const element = document.getElementById('printable-report');
        const filename = `Physics_Report_${currentLevel}_${currentChapter}.pdf`;
        
        // Configure PDF options
        const opt = {
            margin:       [15, 15, 15, 15],
            filename:     filename,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
        };

        // Generate and save
        html2pdf().set(opt).from(element).save();
    }

    // Start App
    window.onload = init;
</script>

</body>
</html>
